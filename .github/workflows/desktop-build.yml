name: Desktop Build

on:
  push:
    tags: ["v*"]

jobs:
  build-mac:
    name: Build Mac Desktop App
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Bundle Python environment
        run: bash desktop/scripts/bundle-python.sh

      - name: Install Electron deps
        working-directory: desktop
        run: npm install

      - name: Build .dmg
        working-directory: desktop
        run: npm run make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: videoscriber-mac
          path: desktop/out/make/**/*
          retention-days: 30
