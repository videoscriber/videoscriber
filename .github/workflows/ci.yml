name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Need history + refs so check_schema_migrations can diff against main.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with Ruff
        run: ruff check app.py transcriber.py database.py

      - name: Guard schema migrations
        run: python scripts/check_schema_migrations.py

      - name: Syntax check
        run: |
          python -c "import ast; ast.parse(open('app.py').read()); ast.parse(open('transcriber.py').read()); ast.parse(open('database.py').read()); print('All files OK')"

      - name: Test imports
        env:
          OPENAI_API_KEY: sk-test
        run: |
          python -c "from app import app; from database import init_db; from transcriber import process_transcription; print('Imports OK')"

      - name: Test database init
        run: |
          python <<'PY'
          import asyncio
          from database import init_db, list_transcriptions

          async def test():
              await init_db()
              records = await list_transcriptions()
              assert isinstance(records, list)
              print('Database OK')

          asyncio.run(test())
          PY

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t videoscriber:test .

      - name: Test Docker container starts
        run: |
          docker run -d --name test-container \
            -e OPENAI_API_KEY=sk-test \
            -e HOST=0.0.0.0 \
            -p 8000:8000 \
            videoscriber:test

          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Container is healthy"
              break
            fi
            sleep 1
          done

          curl -sf http://localhost:8000/health | grep -q '"ok"'
          echo "Docker test passed"

          docker stop test-container
          docker rm test-container
