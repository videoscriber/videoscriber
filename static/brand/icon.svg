<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16102B" />
      <stop offset="50%" style="stop-color:#110C22" />
      <stop offset="100%" style="stop-color:#0A0714" />
    </linearGradient>
    <radialGradient id="ambientGlow" cx="45%" cy="48%" r="40%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.14" />
      <stop offset="55%" style="stop-color:#6D28D9;stop-opacity:0.04" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="camBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD" />
      <stop offset="22%" style="stop-color:#A78BFA" />
      <stop offset="52%" style="stop-color:#8B5CF6" />
      <stop offset="100%" style="stop-color:#6D28D9" />
    </linearGradient>
    <linearGradient id="camSheen" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.24" />
      <stop offset="30%" style="stop-color:#FFFFFF;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="camDepth" x1="50%" y1="100%" x2="50%" y2="20%">
      <stop offset="0%" style="stop-color:#3B0F8A;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#3B0F8A;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B794F6" />
      <stop offset="50%" style="stop-color:#9366ED" />
      <stop offset="100%" style="stop-color:#7C3AED" />
    </linearGradient>
    <filter id="mainGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0.7 0 0 0 0.08  0 0.3 0 0 0  0 0 0.9 0 0.08  0 0 0 0.38 0" result="t"/>
      <feMerge><feMergeNode in="t"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="gn"/>
      <feBlend in="SourceGraphic" in2="gn" mode="soft-light"/>
    </filter>
    <radialGradient id="vig" cx="50%" cy="50%" r="72%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.28" />
    </radialGradient>
    <clipPath id="frame"><rect width="1024" height="1024" rx="220" ry="220"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1024" height="1024" fill="url(#bg)" />
    <rect width="1024" height="1024" fill="url(#bg)" filter="url(#noise)" opacity="0.18" />
    <rect width="1024" height="1024" fill="url(#ambientGlow)" />
    <rect width="1024" height="1024" fill="url(#vig)" />

    <g transform="translate(512, 512)">
      <rect x="-195" y="-155" width="310" height="310" rx="62" ry="62"
            fill="#0a0518" opacity="0.45" transform="translate(4, 8)" />
      <rect x="-195" y="-155" width="310" height="310" rx="62" ry="62" fill="url(#camBody)" filter="url(#mainGlow)" />
      <rect x="-195" y="-155" width="310" height="310" rx="62" ry="62" fill="url(#camSheen)" />
      <rect x="-195" y="-155" width="310" height="310" rx="62" ry="62" fill="url(#camDepth)" />
      <path d="M -133,-155 Q -195,-155 -195,-93 L -195,-20" fill="none" stroke="#EDE9FE" stroke-width="1.5" opacity="0.18" stroke-linecap="round" />

      <path d="M 135,-90 L 210,-130 Q 225,-138 225,-120 L 225,120 Q 225,138 210,130 L 135,90 Z"
            fill="#0a0518" opacity="0.35" transform="translate(3, 6)" />
      <path d="M 135,-90 L 210,-130 Q 225,-138 225,-120 L 225,120 Q 225,138 210,130 L 135,90 Z" fill="url(#lensGrad)" />
      <path d="M 135,-90 L 210,-130 Q 225,-138 225,-120 L 225,120 Q 225,138 210,130 L 135,90 Z" fill="url(#camSheen)" opacity="0.6" />

      <!-- WAVEFORM — symmetric, peak centered at x=-40 (camera body center) -->
      <!-- Left pattern mirrored on right: 16,36,24,60,40,96,70,144,110 → 240 → 110,144,70,96,40,60,24,36,16 -->
      <g opacity="0.9">
        <rect x="-179" y="-8"   width="9" height="16"  rx="4.5" fill="#EDE9FE" opacity="0.4" />
        <rect x="-164" y="-18"  width="9" height="36"  rx="4.5" fill="#DDD6FE" opacity="0.42" />
        <rect x="-149" y="-12"  width="9" height="24"  rx="4.5" fill="#EDE9FE" opacity="0.4" />
        <rect x="-134" y="-30"  width="9" height="60"  rx="4.5" fill="#DDD6FE" opacity="0.45" />
        <rect x="-119" y="-20"  width="9" height="40"  rx="4.5" fill="#EDE9FE" opacity="0.43" />
        <rect x="-104" y="-48"  width="9" height="96"  rx="4.5" fill="#DDD6FE" opacity="0.5" />
        <rect x="-89"  y="-35"  width="9" height="70"  rx="4.5" fill="#EDE9FE" opacity="0.48" />
        <rect x="-74"  y="-72"  width="9" height="144" rx="4.5" fill="#DDD6FE" opacity="0.55" />
        <rect x="-59"  y="-55"  width="9" height="110" rx="4.5" fill="#EDE9FE" opacity="0.52" />
        <rect x="-44"  y="-120" width="9" height="240" rx="4.5" fill="#DDD6FE" opacity="0.65" />
        <rect x="-29"  y="-55"  width="9" height="110" rx="4.5" fill="#EDE9FE" opacity="0.52" />
        <rect x="-14"  y="-72"  width="9" height="144" rx="4.5" fill="#DDD6FE" opacity="0.55" />
        <rect x="1"    y="-35"  width="9" height="70"  rx="4.5" fill="#EDE9FE" opacity="0.48" />
        <rect x="16"   y="-48"  width="9" height="96"  rx="4.5" fill="#DDD6FE" opacity="0.5" />
        <rect x="31"   y="-20"  width="9" height="40"  rx="4.5" fill="#EDE9FE" opacity="0.43" />
        <rect x="46"   y="-30"  width="9" height="60"  rx="4.5" fill="#DDD6FE" opacity="0.45" />
        <rect x="61"   y="-12"  width="9" height="24"  rx="4.5" fill="#EDE9FE" opacity="0.4" />
        <rect x="76"   y="-18"  width="9" height="36"  rx="4.5" fill="#DDD6FE" opacity="0.42" />
        <rect x="91"   y="-8"   width="9" height="16"  rx="4.5" fill="#EDE9FE" opacity="0.4" />
      </g>
    </g>
  </g>
</svg>