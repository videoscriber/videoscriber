<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Videoscriber{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/brand/icon.svg">
    <link rel="icon" type="image/png" href="/static/brand/favicon.png">
    <link rel="apple-touch-icon" href="/static/brand/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/public.css">
    {% block extra_css %}{% endblock %}
</head>
<body class="public-body">
    <header class="public-header">
        <a href="/" class="public-brand" aria-label="Videoscriber home">
            <img src="/static/brand/logo.svg" alt="Videoscriber" class="brand-logo">
        </a>
        <nav class="public-nav">
            {% block nav %}
            <a href="/login" class="nav-link">Log in</a>
            <a href="/signup" class="nav-cta">Get started</a>
            {% endblock %}
        </nav>
    </header>
    <main class="public-main">{% block content %}{% endblock %}</main>
    <footer class="public-footer">
        <div class="public-footer-inner">
            <div class="public-footer-brand">
                <img src="/static/brand/logo.svg" alt="Videoscriber" class="brand-logo">
                <span class="muted">&copy; 2026 Videoscriber LLC</span>
            </div>
            <nav class="public-footer-links">
                <a href="/terms">Terms</a>
                <a href="/privacy">Privacy</a>
                <a href="https://github.com/videoscriber/videoscriber" rel="noopener" target="_blank">GitHub</a>
                <a href="mailto:legal@videoscriber.ai">Contact</a>
            </nav>
        </div>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
