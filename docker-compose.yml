services:
  videoscriber:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    # Give the app up to 60s to finish in-flight ffmpeg work and atomically
    # rename output files before Docker sends SIGKILL. Matches the app's
    # GRACEFUL_SHUTDOWN_S so the two don't fight.
    stop_grace_period: 60s
    stop_signal: SIGTERM
